<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ project.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/dashboard.js') }}" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <div class="brand">NeuroRepurposing Explorer</div>
          <div class="brand-subtitle">Clinical-grade view for Alzheimer gene and drug discovery</div>
        </div>
        <nav class="nav-links">
          <a href="/" class="nav-link">Overview</a>
          <a href="/genes" class="nav-link">Gene explorer</a>
          <a href="/report" class="nav-link">Full report</a>
        </nav>
      </header>

      <main>
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
